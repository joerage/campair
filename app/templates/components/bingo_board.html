<section class="board-shell">
    <div class="board-header">
        <div class="board-kicker">Scouting Board</div>
        <p class="board-subtitle">Tap each match, protect your line, and chase the diagonal glory.</p>
    </div>

    <div class="rink-grid">
        {% for square in session.board %}
        {% set is_winning = square.id in session.winning_square_ids %}
        <button
            {% if not square.is_free_space %}
            hx-post="/toggle/{{ square.id }}"
            hx-target="#game-container"
            hx-swap="outerHTML"
            {% endif %}
            {% if square.is_free_space %}disabled{% endif %}
            class="rink-square{% if square.is_marked %} is-marked{% endif %}{% if is_winning %} is-winning{% endif %}{% if square.is_free_space %} is-free{% endif %}"
            aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
            aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
            <span class="square-inner">
                <span class="square-stamp">
                    {% if square.is_free_space %}
                    Centre Ice
                    {% elif is_winning %}
                    Goal
                    {% elif square.is_marked %}
                    Claimed
                    {% else %}
                    Scout
                    {% endif %}
                </span>
                <span class="square-label">{{ square.text }}</span>
            </span>
        </button>
        {% endfor %}
    </div>
</section>
